<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmeticos Trujillo | Plataforma de Hallazgos</title>
    <meta
      name="description"
      content="Plataforma de hallazgos para registrar, dar seguimiento y mejorar procesos de forma colaborativa en Cosmeticos Trujillo."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ct-bone: #f7f1ea;
        --ct-cream: #fffaf3;
        --ct-rose: #c98f81;
        --ct-burgundy: #7b3045;
        --ct-wine: #4c1c2c;
        --ct-gold: #c7a56a;
        --ct-text: #3b2430;
        --ct-soft-shadow: 0 16px 40px rgba(76, 28, 44, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Manrope', sans-serif;
        color: var(--ct-text);
        background: radial-gradient(
            circle at 20% 10%,
            rgba(201, 143, 129, 0.28),
            transparent 42%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(123, 48, 69, 0.2),
            transparent 50%
          ),
          linear-gradient(145deg, var(--ct-bone), var(--ct-cream));
        display: flex;
        flex-direction: column;
      }

      .page {
        width: min(1100px, 92vw);
        margin: 0 auto;
        flex: 1;
        display: grid;
        align-content: center;
        gap: 2rem;
        padding: 3rem 0 2rem;
      }

      .hero {
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(123, 48, 69, 0.18);
        border-radius: 28px;
        box-shadow: var(--ct-soft-shadow);
        overflow: hidden;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1.1fr 1fr;
      }

      .hero-content {
        padding: 3rem;
      }

      .hero-title {
        font-family: 'Playfair Display', serif;
        margin: 0 0 1rem;
        line-height: 1.1;
        font-size: clamp(2rem, 3vw, 3rem);
        color: var(--ct-wine);
      }

      .hero-title span {
        color: var(--ct-burgundy);
      }

      .hero-text {
        margin: 0 0 1.25rem;
        font-size: 1.02rem;
        line-height: 1.7;
        max-width: 56ch;
      }

      .hero-badge {
        display: inline-block;
        padding: 0.55rem 0.9rem;
        border-radius: 999px;
        background: rgba(199, 165, 106, 0.2);
        border: 1px solid rgba(199, 165, 106, 0.7);
        color: var(--ct-wine);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .hero-visual {
        position: relative;
        display: grid;
        place-items: center;
        padding: 2.5rem;
        background: linear-gradient(
            160deg,
            rgba(123, 48, 69, 0.12),
            rgba(201, 143, 129, 0.25)
          ),
          repeating-linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.15),
            rgba(255, 255, 255, 0.15) 8px,
            transparent 8px,
            transparent 16px
          );
      }

      .main-logo {
        width: min(90%, 360px);
        height: auto;
        display: block;
      }

      footer {
        border-top: 1px solid rgba(123, 48, 69, 0.2);
        background: rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(3px);
      }

      .footer-inner {
        width: min(1100px, 92vw);
        margin: 0 auto;
        padding: 1.2rem 0 1.4rem;
        display: flex;
        justify-content: center;
      }

      .footer-logo {
        width: min(220px, 50vw);
        height: auto;
        opacity: 0.95;
      }

      .reveal {
        opacity: 0;
        transform: translateY(14px);
        animation: rise 700ms ease forwards;
      }

      .reveal:nth-child(1) {
        animation-delay: 100ms;
      }

      .reveal:nth-child(2) {
        animation-delay: 260ms;
      }

      .reveal:nth-child(3) {
        animation-delay: 420ms;
      }

      @keyframes rise {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 900px) {
        .hero-grid {
          grid-template-columns: 1fr;
        }

        .hero-content {
          padding: 2rem;
        }

        .hero-visual {
          padding: 1.75rem 1.5rem 2.2rem;
        }
      }

      @media (max-width: 520px) {
        .page {
          padding-top: 1.5rem;
        }

        .hero {
          border-radius: 20px;
        }

        .hero-title {
          font-size: 1.85rem;
        }

        .hero-text {
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-grid">
          <div class="hero-content">
            <h1 class="hero-title reveal">
              Bienvenidos a la <span>API de Hallazgos</span>
            </h1>
            <p class="hero-text reveal">
              La API REST sirve para la captura de evidencias en planta para su
              mejora continua. La API es el punto clave para registrar
              hallazgos, darles seguimiento y convertirlos en acciones de mejora
              reales.
            </p>
            <div class="hero-badge reveal">
              Captura de evidencias y mejora continua
            </div>
          </div>
          <div class="hero-visual">
            <img
              class="main-logo"
              src="https://api.comportarte.com/static/images/login/logo-superior.png"
              alt="Logo principal de Cosmeticos Trujillo"
            />
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-inner">
        <img
          class="footer-logo"
          src="https://api.comportarte.com/static/images/login/logo-inferior.png"
          alt="Logo institucional inferior de Cosmeticos Trujillo"
        />
      </div>
    </footer>
  </body>
</html>
